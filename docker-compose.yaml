services:
  mysql-server:
    image: mariadb:11.4
    container_name: zabbix-mysql
    environment:
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix-password
      MYSQL_ROOT_PASSWORD: root-password
      TZ: Asia/Jakarta
    volumes:
      - ./db:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "3306:3306"
    networks:
      - zabbix-network
    restart: always

  zabbix-server:
    image: zabbix/zabbix-server-mysql:latest
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: mysql-server
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix-password
      TZ: Asia/Jakarta
    ports:
      - "10051:10051"
    depends_on:
      - mysql-server
    volumes:
      - ./data:/var/lib/zabbix
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - zabbix-network
    restart: always

  zabbix-web:
    image: zabbix/zabbix-web-apache-mysql:latest
    container_name: zabbix-web
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: mysql-server
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix-password
      PHP_TZ: Asia/Jakarta
      TZ: Asia/Jakarta
    ports:
      - "8081:8080"
    depends_on:
      - zabbix-server
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - zabbix-network
    restart: always

  zabbix-agent:
    image: zabbix/zabbix-agent:latest
    container_name: zabbix-agent
    environment:
      ZBX_SERVER_HOST: zabbix-server
      TZ: Asia/Jakarta
    depends_on:
      - zabbix-server
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - zabbix-network
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      PMA_HOST: mysql-server
      MYSQL_ROOT_PASSWORD: root-password
      UPLOAD_LIMIT: 1G
      TZ: Asia/Jakarta
    ports:
      - "9090:80"
    depends_on:
      - mysql-server
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - zabbix-network
    restart: always

networks:
  zabbix-network:
    driver: bridge
